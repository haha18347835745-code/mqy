<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天宇人力技能培训赋能库</title>
  <meta name="description" content="天宇人力技能培训赋能库，提供丰富的培训资料和技能提升资源">
  <meta name="keywords" content="人力资源,技能培训,赋能库,培训资料">
  <meta name="author" content="天宇人力">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="page-home" class="page active">
      <div class="banner-section">
        <div class="banner-swiper">
          <div class="banner-slides" id="bannerSlides"></div>
          <div class="banner-dots" id="bannerDots"></div>
        </div>
      </div>

      <div class="search-section">
        <div class="search-box" id="searchBox">
          <span class="search-icon-text">🔍</span>
          <span class="search-placeholder">搜索资料名称...</span>
        </div>
      </div>

      <div class="quick-actions">
        <div class="action-item" id="profileBtn">
          <div class="action-icon-wrapper profile-bg">
            <span class="action-icon-text">👤</span>
          </div>
          <span class="action-label">个人中心</span>
        </div>
      </div>

      <div class="folder-section">
        <div class="section-header">
          <span class="section-title">资料分类</span>
        </div>
        <div class="folder-grid" id="folderGrid"></div>
      </div>

      <div class="latest-section">
        <div class="section-header">
          <span class="section-title">最新上传</span>
        </div>
        <div class="file-list" id="latestFiles"></div>
        <div class="empty-result" id="latestEmpty" style="display:none;">
          <span class="empty-text">暂无最新上传</span>
        </div>
      </div>
    </div>

    <div id="page-search" class="page">
      <div class="search-header">
        <span class="back-btn" id="searchBackBtn">←</span>
        <div class="search-input-wrapper">
          <span class="search-icon-text">🔍</span>
          <input class="search-input" id="searchInput" placeholder="搜索资料名称...">
          <span class="clear-icon" id="clearIcon" style="display:none;">✕</span>
        </div>
        <span class="cancel-btn" id="cancelBtn">取消</span>
      </div>

      <div class="result-count" id="resultCount" style="display:none;"></div>

      <div class="result-list" id="resultList" style="display:none;"></div>

      <div class="empty-result" id="searchEmpty" style="display:none;">
        <span class="empty-icon">📭</span>
        <span class="empty-text">未找到相关资料</span>
        <span class="empty-hint">换个关键词试试吧</span>
      </div>
    </div>

    <div id="page-file" class="page">
      <div class="file-header">
        <span class="back-btn" id="fileBackBtn">←</span>
        <span class="file-title" id="fileTitle"></span>
        <div class="file-type-badge">
          <span id="fileTypeText"></span>
        </div>
      </div>

      <div class="content-wrapper" id="contentWrapper"></div>

      <div class="action-bar" id="actionBar"></div>
    </div>

    <div id="page-profile" class="page">
      <span class="back-btn" id="profileBackBtn">←</span>
      <div class="profile-header">
        <div class="avatar-wrapper">
          <span class="avatar-emoji" id="avatarEmoji">👤</span>
        </div>
        <span class="username" id="username">游客用户</span>
        <span class="user-tip" id="userTip">仅可查看资料</span>
      </div>

      <div class="menu-list" id="menuList1">
        <div class="menu-item" id="loginOrUploadItem">
          <div class="menu-left">
            <span class="menu-icon" id="loginIcon">🔐</span>
            <span class="menu-text" id="loginText">管理员登录</span>
          </div>
          <span class="arrow-icon">›</span>
        </div>
      </div>

      <div class="folder-management" id="folderManagement" style="display:none;">
        <div class="section-header">
          <span class="section-title">文件夹管理</span>
          <span class="add-folder-btn" id="addFolderBtn">➕ 添加</span>
        </div>
        <div class="folder-list" id="profileFolderList"></div>
      </div>

      <div class="menu-list" id="menuList2">
        <div class="menu-item">
          <div class="menu-left">
            <span class="menu-icon">📜</span>
            <span class="menu-text">浏览历史</span>
          </div>
          <span class="arrow-icon">›</span>
        </div>
        <div class="menu-item">
          <div class="menu-left">
            <span class="menu-icon">⭐</span>
            <span class="menu-text">我的收藏</span>
          </div>
          <span class="arrow-icon">›</span>
        </div>
      </div>

      <div class="menu-list" id="menuList3">
        <div class="menu-item">
          <div class="menu-left">
            <span class="menu-icon">ℹ️</span>
            <span class="menu-text">关于我们</span>
          </div>
          <span class="arrow-icon">›</span>
        </div>
        <div class="menu-item" id="logoutItem" style="display:none;">
          <div class="menu-left">
            <span class="menu-icon">🚪</span>
            <span class="menu-text">退出登录</span>
          </div>
          <span class="arrow-icon">›</span>
        </div>
      </div>

      <div class="app-info">
        <span class="version">知识库检索 v1.0.0</span>
      </div>

      <div class="modal" id="loginModal" style="display:none;">
        <div class="modal-mask" id="loginMask"></div>
        <div class="modal-content">
          <div class="modal-title">管理员登录</div>
          <input class="modal-input" id="passwordInput" type="password" placeholder="请输入管理员密码">
          <div class="modal-buttons">
            <button class="modal-btn cancel" id="loginCancelBtn">取消</button>
            <button class="modal-btn confirm" id="loginConfirmBtn">登录</button>
          </div>
        </div>
      </div>

      <div class="modal" id="addFolderModal" style="display:none;">
        <div class="modal-mask" id="addFolderMask"></div>
        <div class="modal-content">
          <div class="modal-title">添加文件夹</div>
          <input class="modal-input" id="folderNameInput" placeholder="请输入文件夹名称">
          <div class="icon-select" id="iconSelect"></div>
          <div class="modal-buttons">
            <button class="modal-btn cancel" id="addFolderCancelBtn">取消</button>
            <button class="modal-btn confirm" id="addFolderConfirmBtn">添加</button>
          </div>
        </div>
      </div>
    </div>

    <div id="page-upload" class="page">
      <span class="back-btn" id="uploadBackBtn">←</span>
      <div class="upload-section">
        <div class="upload-title">选择文件上传</div>
        <div class="upload-tip">支持 PDF、Word、Excel、图片等文件</div>
        
        <div class="upload-box" id="uploadBox">
          <span class="upload-icon">➕</span>
          <span class="upload-text">点击选择文件</span>
        </div>
      </div>

      <div class="file-list" id="selectedFileBox" style="display:none;">
        <div class="selected-file">
          <div class="file-icon-wrapper">
            <span class="file-type-emoji" id="selectedFileEmoji">📄</span>
          </div>
          <div class="file-info">
            <span class="file-name" id="selectedFileName"></span>
            <span class="file-size" id="selectedFileSize"></span>
          </div>
          <span class="remove-icon" id="removeFileBtn">✕</span>
        </div>
      </div>

      <div class="folder-section" id="uploadFolderSection" style="display:none;">
        <div class="section-title">选择分类文件夹</div>
        <div class="folder-list-grid" id="uploadFolderList"></div>
      </div>

      <div class="upload-btn-wrapper" id="uploadBtnWrapper" style="display:none;">
        <input class="title-input" id="titleInput" placeholder="请输入文件标题">
        <button class="submit-btn" id="submitBtn">确认上传</button>
      </div>

      <div class="history-section" id="historySection" style="display:none;">
        <div class="section-title">上传记录</div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>

    <div id="page-folder" class="page">
      <span class="back-btn" id="folderBackBtn">←</span>
      <div class="folder-header">
        <span class="folder-icon" id="folderPageIcon">📁</span>
        <span class="folder-name" id="folderPageName"></span>
        <span class="file-count" id="folderPageCount"></span>
      </div>

      <div class="file-list" id="folderFileList" style="display:none;"></div>

      <div class="empty-result" id="folderEmpty" style="display:none;">
        <span class="empty-icon">📁</span>
        <span class="empty-text">该分类暂无文件</span>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" style="display:none">
  <input type="file" id="imageInput" style="display:none" accept="image/*">

  <script src="app.js"></script>
</body>
</html>
